<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0FAF4"/>
      <stop offset="100%" stop-color="#E0F5EA"/>
    </linearGradient>
    <linearGradient id="clipboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5FAF7"/>
    </linearGradient>
    <linearGradient id="tape" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#FFC233"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Background grid (subtle) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#085B20" stroke-width="0.4" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- === MEASURING TAPE (horizontal, bottom area) === -->
  <rect x="60" y="310" width="680" height="38" rx="6" fill="url(#tape)"/>
  <!-- Tape markings -->
  <line x1="80" y1="310" x2="80" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="100" y1="310" x2="100" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="120" y1="310" x2="120" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="140" y1="310" x2="140" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="160" y1="310" x2="160" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="180" y1="310" x2="180" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="200" y1="310" x2="200" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="220" y1="310" x2="220" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="240" y1="310" x2="240" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="260" y1="310" x2="260" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="280" y1="310" x2="280" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="300" y1="310" x2="300" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="320" y1="310" x2="320" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="340" y1="310" x2="340" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="360" y1="310" x2="360" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="380" y1="310" x2="380" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="400" y1="310" x2="400" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="420" y1="310" x2="420" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="440" y1="310" x2="440" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="460" y1="310" x2="460" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="480" y1="310" x2="480" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="500" y1="310" x2="500" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="520" y1="310" x2="520" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="540" y1="310" x2="540" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="560" y1="310" x2="560" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="580" y1="310" x2="580" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="600" y1="310" x2="600" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="620" y1="310" x2="620" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="640" y1="310" x2="640" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="660" y1="310" x2="660" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="680" y1="310" x2="680" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <line x1="700" y1="310" x2="700" y2="318" stroke="#8B6914" stroke-width="1"/>
  <line x1="720" y1="310" x2="720" y2="322" stroke="#8B6914" stroke-width="1.5"/>
  <!-- cm numbers on tape -->
  <text x="76" y="340" font-family="monospace" font-size="11" fill="#6B4A10" opacity="0.85">10</text>
  <text x="196" y="340" font-family="monospace" font-size="11" fill="#6B4A10" opacity="0.85">20</text>
  <text x="316" y="340" font-family="monospace" font-size="11" fill="#6B4A10" opacity="0.85">30</text>
  <text x="436" y="340" font-family="monospace" font-size="11" fill="#6B4A10" opacity="0.85">40</text>
  <text x="556" y="340" font-family="monospace" font-size="11" fill="#6B4A10" opacity="0.85">50</text>
  <text x="676" y="340" font-family="monospace" font-size="11" fill="#6B4A10" opacity="0.85">60</text>

  <!-- === GARMENT OUTLINE (T-shirt, left side) === -->
  <g opacity="0.22" stroke="#085B20" stroke-width="2" fill="#085B20" fill-opacity="0.05">
    <!-- Left sleeve -->
    <path d="M 95 80 L 145 65 L 145 140 L 105 155" />
    <!-- Right sleeve -->
    <path d="M 285 80 L 235 65 L 235 140 L 275 155"/>
    <!-- Body -->
    <rect x="143" y="65" width="94" height="175" rx="8"/>
    <!-- Collar -->
    <ellipse cx="190" cy="67" rx="32" ry="16" fill="#E8F5EC" fill-opacity="0.5" stroke="#085B20"/>
  </g>

  <!-- === CLIPBOARD / CHECKLIST (center) === -->
  <!-- Shadow -->
  <rect x="268" y="42" width="270" height="248" rx="14" fill="#085B20" opacity="0.08"/>
  <!-- Board -->
  <rect x="262" y="36" width="270" height="248" rx="14" fill="url(#clipboard)" stroke="#C8E6D0" stroke-width="1.5"/>
  <!-- Clip at top -->
  <rect x="352" y="24" width="90" height="24" rx="8" fill="#085B20"/>
  <rect x="375" y="20" width="44" height="14" rx="5" fill="#0E7A2C"/>
  <circle cx="397" cy="27" r="5" fill="#085B20"/>

  <!-- Header bar -->
  <rect x="262" y="56" width="270" height="34" rx="0" fill="#085B20"/>
  <text x="397" y="79" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">QC INSPECTION REPORT</text>

  <!-- Checklist items -->
  <!-- Item 1 — checked -->
  <rect x="282" y="106" width="230" height="32" rx="6" fill="#E8F5EC"/>
  <rect x="290" y="113" width="18" height="18" rx="4" fill="#085B20"/>
  <path d="M 294 122 L 299 128 L 308 116" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="318" y="127" font-family="'Segoe UI', Arial, sans-serif" font-size="12.5" fill="#1A1A1A">Fabric GSM &amp; Shade Check</text>

  <!-- Item 2 — checked -->
  <rect x="282" y="148" width="230" height="32" rx="6" fill="#E8F5EC"/>
  <rect x="290" y="155" width="18" height="18" rx="4" fill="#085B20"/>
  <path d="M 294 164 L 299 170 L 308 158" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="318" y="169" font-family="'Segoe UI', Arial, sans-serif" font-size="12.5" fill="#1A1A1A">Stitch Count &amp; Seam Strength</text>

  <!-- Item 3 — checked -->
  <rect x="282" y="190" width="230" height="32" rx="6" fill="#E8F5EC"/>
  <rect x="290" y="197" width="18" height="18" rx="4" fill="#085B20"/>
  <path d="M 294 206 L 299 212 L 308 200" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="318" y="211" font-family="'Segoe UI', Arial, sans-serif" font-size="12.5" fill="#1A1A1A">Measurements vs. Size Chart</text>

  <!-- Item 4 — checked -->
  <rect x="282" y="232" width="230" height="32" rx="6" fill="#E8F5EC"/>
  <rect x="290" y="239" width="18" height="18" rx="4" fill="#085B20"/>
  <path d="M 294 248 L 299 254 L 308 242" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <text x="318" y="253" font-family="'Segoe UI', Arial, sans-serif" font-size="12.5" fill="#1A1A1A">Finishing &amp; Presentation Pass</text>

  <!-- === MAGNIFYING GLASS (right side) === -->
  <!-- Handle -->
  <line x1="628" y1="240" x2="688" y2="295" stroke="#085B20" stroke-width="14" stroke-linecap="round"/>
  <line x1="628" y1="240" x2="688" y2="295" stroke="#0E7A2C" stroke-width="9" stroke-linecap="round"/>
  <!-- Lens ring -->
  <circle cx="568" cy="172" r="88" fill="white" fill-opacity="0.6" stroke="#085B20" stroke-width="16"/>
  <circle cx="568" cy="172" r="88" fill="none" stroke="#41E296" stroke-width="5" opacity="0.5"/>
  <!-- Lens interior - shows fabric texture -->
  <circle cx="568" cy="172" r="72" fill="#E8F5EC" fill-opacity="0.7"/>
  <!-- Fabric lines inside lens -->
  <line x1="505" y1="172" x2="631" y2="172" stroke="#085B20" stroke-width="1.5" opacity="0.25"/>
  <line x1="505" y1="152" x2="631" y2="152" stroke="#085B20" stroke-width="1" opacity="0.2"/>
  <line x1="505" y1="192" x2="631" y2="192" stroke="#085B20" stroke-width="1" opacity="0.2"/>
  <line x1="568" y1="108" x2="568" y2="236" stroke="#085B20" stroke-width="1.5" opacity="0.25"/>
  <line x1="548" y1="108" x2="548" y2="236" stroke="#085B20" stroke-width="1" opacity="0.2"/>
  <line x1="588" y1="108" x2="588" y2="236" stroke="#085B20" stroke-width="1" opacity="0.2"/>
  <!-- Big checkmark inside lens -->
  <path d="M 530 175 L 556 200 L 608 148" stroke="#085B20" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 530 175 L 556 200 L 608 148" stroke="#41E296" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ISO badge -->
  <rect x="660" y="32" width="110" height="48" rx="8" fill="#085B20"/>
  <text x="715" y="53" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">ISO 9001</text>
  <text x="715" y="69" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#41E296" text-anchor="middle">ALIGNED</text>

  <!-- AQL badge -->
  <rect x="660" y="92" width="110" height="48" rx="8" fill="#0E7A2C"/>
  <text x="715" y="113" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle">AQL 2.5</text>
  <text x="715" y="129" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#41E296" text-anchor="middle">COMPLIANT</text>
</svg>
