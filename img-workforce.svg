<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#062E10"/>
      <stop offset="100%" stop-color="#0E7A2C"/>
    </linearGradient>
    <linearGradient id="desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6340"/>
      <stop offset="100%" stop-color="#6B4A28"/>
    </linearGradient>
    <linearGradient id="machine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle radial glow in centre -->
  <radial-gradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#41E296" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="transparent"/>
  </radial-gradient>
  <circle cx="400" cy="200" r="300" fill="#41E296" fill-opacity="0.04"/>

  <!-- === FLOOR LINE === -->
  <rect x="0" y="310" width="800" height="90" fill="#041C09" opacity="0.6"/>
  <line x1="0" y1="310" x2="800" y2="310" stroke="#41E296" stroke-width="1.5" opacity="0.25"/>

  <!-- ============================
       WORKER 1 (left)
       ============================ -->
  <!-- Desk -->
  <rect x="60" y="255" width="190" height="16" rx="4" fill="url(#desk)"/>
  <rect x="80" y="271" width="12" height="40" rx="3" fill="#6B4A28"/>
  <rect x="228" y="271" width="12" height="40" rx="3" fill="#6B4A28"/>

  <!-- Sewing machine on desk 1 -->
  <rect x="95" y="215" width="80" height="42" rx="6" fill="url(#machine)"/>
  <rect x="100" y="220" width="60" height="10" rx="3" fill="#3A3A3A"/>
  <!-- Machine needle arm -->
  <rect x="153" y="205" width="8" height="30" rx="3" fill="#444"/>
  <rect x="148" y="205" width="18" height="6" rx="3" fill="#555"/>
  <!-- Bobbin -->
  <circle cx="120" cy="232" r="7" fill="#555"/>
  <circle cx="120" cy="232" r="3" fill="#333"/>
  <!-- Fabric under needle -->
  <rect x="100" y="253" width="70" height="4" rx="2" fill="#41E296" opacity="0.5"/>

  <!-- Person 1 silhouette -->
  <!-- Head -->
  <circle cx="155" cy="155" r="28" fill="#E8C4A0"/>
  <!-- Hair -->
  <path d="M 127 145 Q 155 118 183 145 Q 183 130 155 126 Q 127 130 127 145 Z" fill="#3D2B1A"/>
  <!-- Neck -->
  <rect x="147" y="178" width="16" height="16" fill="#D4A882"/>
  <!-- Body/top -->
  <path d="M 115 194 Q 110 240 118 265 L 192 265 Q 200 240 195 194 Q 175 188 155 188 Q 135 188 115 194 Z" fill="#E8673F"/>
  <!-- Collar -->
  <path d="M 140 194 L 155 210 L 170 194 Q 163 186 155 186 Q 147 186 140 194 Z" fill="#D45A30"/>
  <!-- Left arm (extended forward, working) -->
  <path d="M 118 205 Q 90 215 82 238 Q 88 242 95 240 Q 100 222 120 214 Z" fill="#D4A882"/>
  <!-- Right arm -->
  <path d="M 192 205 Q 210 218 200 240 Q 194 242 188 240 Q 196 220 186 212 Z" fill="#D4A882"/>

  <!-- ============================
       WORKER 2 (center)
       ============================ -->
  <!-- Desk 2 -->
  <rect x="305" y="255" width="190" height="16" rx="4" fill="url(#desk)"/>
  <rect x="325" y="271" width="12" height="40" rx="3" fill="#6B4A28"/>
  <rect x="473" y="271" width="12" height="40" rx="3" fill="#6B4A28"/>

  <!-- Sewing machine on desk 2 -->
  <rect x="340" y="215" width="80" height="42" rx="6" fill="url(#machine)"/>
  <rect x="345" y="220" width="60" height="10" rx="3" fill="#3A3A3A"/>
  <rect x="398" y="205" width="8" height="30" rx="3" fill="#444"/>
  <rect x="393" y="205" width="18" height="6" rx="3" fill="#555"/>
  <circle cx="365" cy="232" r="7" fill="#555"/>
  <circle cx="365" cy="232" r="3" fill="#333"/>
  <rect x="345" y="253" width="70" height="4" rx="2" fill="#FFD166" opacity="0.6"/>

  <!-- Person 2 silhouette -->
  <circle cx="400" cy="150" r="28" fill="#C8956A"/>
  <!-- Hair (bun/tied) -->
  <path d="M 372 142 Q 400 115 428 142 Q 428 128 400 122 Q 372 128 372 142 Z" fill="#1A0A00"/>
  <circle cx="400" cy="122" r="9" fill="#1A0A00"/>
  <!-- Neck -->
  <rect x="392" y="174" width="16" height="16" fill="#B87E54"/>
  <!-- Body/top (different colour) -->
  <path d="M 360 190 Q 355 238 363 262 L 437 262 Q 445 238 440 190 Q 420 184 400 184 Q 380 184 360 190 Z" fill="#5B8DD9"/>
  <path d="M 385 190 L 400 206 L 415 190 Q 408 182 400 182 Q 392 182 385 190 Z" fill="#4A7FC1"/>
  <!-- Arms working -->
  <path d="M 363 200 Q 336 212 328 236 Q 334 240 340 238 Q 344 218 365 210 Z" fill="#B87E54"/>
  <path d="M 437 200 Q 454 214 446 238 Q 440 240 435 238 Q 442 218 434 208 Z" fill="#B87E54"/>

  <!-- ============================
       WORKER 3 (right)
       ============================ -->
  <!-- Desk 3 -->
  <rect x="550" y="255" width="190" height="16" rx="4" fill="url(#desk)"/>
  <rect x="570" y="271" width="12" height="40" rx="3" fill="#6B4A28"/>
  <rect x="718" y="271" width="12" height="40" rx="3" fill="#6B4A28"/>

  <!-- Sewing machine on desk 3 -->
  <rect x="580" y="215" width="80" height="42" rx="6" fill="url(#machine)"/>
  <rect x="585" y="220" width="60" height="10" rx="3" fill="#3A3A3A"/>
  <rect x="638" y="205" width="8" height="30" rx="3" fill="#444"/>
  <rect x="633" y="205" width="18" height="6" rx="3" fill="#555"/>
  <circle cx="604" cy="232" r="7" fill="#555"/>
  <circle cx="604" cy="232" r="3" fill="#333"/>
  <rect x="585" y="253" width="70" height="4" rx="2" fill="#C084FC" opacity="0.5"/>

  <!-- Person 3 silhouette -->
  <circle cx="644" cy="152" r="28" fill="#E8C4A0"/>
  <path d="M 616 143 Q 644 116 672 143 Q 672 128 644 123 Q 616 128 616 143 Z" fill="#5C3A1A"/>
  <rect x="636" y="176" width="16" height="16" fill="#D4A882"/>
  <!-- Body/top -->
  <path d="M 604 192 Q 599 240 607 262 L 681 262 Q 689 240 684 192 Q 664 186 644 186 Q 624 186 604 192 Z" fill="#E8673F" opacity="0.85"/>
  <path d="M 629 192 L 644 208 L 659 192 Q 652 184 644 184 Q 636 184 629 192 Z" fill="#D45A30"/>
  <path d="M 607 202 Q 580 214 572 238 Q 578 242 584 240 Q 588 220 608 212 Z" fill="#D4A882"/>
  <path d="M 681 202 Q 698 216 690 240 Q 684 242 679 238 Q 686 218 678 210 Z" fill="#D4A882"/>

  <!-- === ACCENT ELEMENTS === -->
  <!-- Thread spool left -->
  <ellipse cx="78" cy="255" rx="14" ry="9" fill="#FFD166" opacity="0.7"/>
  <rect x="72" y="238" width="12" height="17" rx="2" fill="#FFC233" opacity="0.7"/>
  <ellipse cx="78" cy="238" rx="14" ry="9" fill="#FFD166" opacity="0.7"/>

  <!-- Thread spool right -->
  <ellipse cx="722" cy="255" rx="14" ry="9" fill="#41E296" opacity="0.65"/>
  <rect x="716" y="238" width="12" height="17" rx="2" fill="#2DBF78" opacity="0.65"/>
  <ellipse cx="722" cy="238" rx="14" ry="9" fill="#41E296" opacity="0.65"/>

  <!-- Scattered light dots (ceiling lights) -->
  <circle cx="200" cy="45" r="20" fill="#41E296" opacity="0.08"/>
  <circle cx="400" cy="35" r="24" fill="#41E296" opacity="0.08"/>
  <circle cx="600" cy="45" r="20" fill="#41E296" opacity="0.08"/>

  <!-- Overhead light beams -->
  <path d="M 200 52 L 170 135 L 230 135 Z" fill="#41E296" opacity="0.04"/>
  <path d="M 400 46 L 370 135 L 430 135 Z" fill="#41E296" opacity="0.04"/>
  <path d="M 600 52 L 570 135 L 630 135 Z" fill="#41E296" opacity="0.04"/>

  <!-- Banner text strip at bottom -->
  <rect x="0" y="360" width="800" height="40" fill="#041C09" opacity="0.8"/>
  <text x="400" y="386" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#41E296" text-anchor="middle" letter-spacing="2" opacity="0.9">SKILLED · INCLUSIVE · FAIRLY PAID</text>
</svg>
